name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DOTNET_RUNNING_IN_CONTAINER: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: VideoManager/global.json

      - name: Restore
        run: dotnet restore VideoManager/VideoManager.slnx

      - name: Build
        run: dotnet build VideoManager/VideoManager.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test VideoManager/VideoManager.slnx --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults/*.trx

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-manager-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: video-manager-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit
