name: E2E Tests
on:
    pull_request:
        types: [opened, synchronize, reopened]

jobs:
    build:
        name: Build and analyze
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.101"
            - name: Build backend
              shell: pwsh
              working-directory: VideoManager
              run: dotnet run --project VideoManager.AppHost & echo $! > backend.pid

            - name: Install dependencies
              working-directory: video-manager-frontend
              run: npm ci

            - name: Install Playwright Browsers
              working-directory: video-manager-frontend
              run: npx playwright install --with-deps

            - name: Run Playwright tests
              working-directory: video-manager-frontend
              run: npx playwright test
              env:
                  NEXT_PUBLIC_API_URL: "http://localhost:5001"

            - name: Stop backend
              if: always()
              working-directory: ./VideoManager/VManBackend
              run: |
                if [ -f backend.pid ]; then
                  kill $(cat backend.pid) || true
                  rm backend.pid
                fi

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                name: playwright-report
                path: video-manager-frontend/playwright-report/
                retention-days: 30