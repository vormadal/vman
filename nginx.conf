pid /tmp/nginx.pid;
error_log /dev/stderr;

events {}

http {
    access_log /dev/stdout;

    # Video manager handles media exports and previews; raise body size limit accordingly
    client_max_body_size 500m;

    # Only forward Upgrade/Connection headers for actual WebSocket requests
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Preserve the external scheme from the upstream proxy (Coolify/Traefik terminates
    # TLS and forwards over http). Fall back to $scheme for direct access.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    server {
        listen 80;

        # Route API requests to the .NET backend
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            # Sync jobs and collection exports can be long-running
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Expose the backend health endpoint through nginx for platform health checks
        location = /health {
            proxy_pass http://127.0.0.1:8080/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Route everything else to the Next.js frontend
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
