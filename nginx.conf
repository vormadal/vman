pid /tmp/nginx.pid;
error_log /dev/stderr;

events {}

http {
    access_log /dev/stdout;

    # Video manager handles media exports and previews; raise body size limit accordingly
    client_max_body_size 500m;

    server {
        listen 80;

        # Route API requests to the .NET backend
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Sync jobs and collection exports can be long-running
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Route everything else to the Next.js frontend
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
