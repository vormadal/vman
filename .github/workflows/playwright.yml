name: E2E Tests
on:
    pull_request:
        types: [opened, synchronize, reopened]

jobs:
    build:
        name: Build and analyze
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.101"
            
            - name: Run Aspire
              shell: pwsh
              working-directory: VideoManager
              run: dotnet run --project VideoManager.AppHost & echo $! > backend.pid

            - name: Install dependencies
              working-directory: video-manager-frontend
              run: npm ci

            - name: Install Playwright Browsers
              working-directory: video-manager-frontend
              run: npx playwright install --with-deps

            - name: Wait for backend to be ready
              run: timeout 60 bash -c 'until curl -s http://localhost:5001/health > /dev/null; do sleep 1; done' || exit 1

            - name: Run Playwright tests
              working-directory: video-manager-frontend
              run: npx playwright test
              env:
                  NEXT_PUBLIC_API_URL: "http://localhost:5001"
                  PLAYWRIGHT_BASE_URL: "http://localhost:3000"
                  TEST_USER_EMAIL: test.user@example.com
                  TEST_USER_PASSWORD: TestPassword123!


            - name: Stop backend
              if: always()
              working-directory: ./VideoManager/VManBackend
              run: |
                if [ -f backend.pid ]; then
                  kill $(cat backend.pid) || true
                  rm backend.pid
                fi

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                name: playwright-report
                path: video-manager-frontend/playwright-report/
                retention-days: 30