name: PR Checks

permissions:
  contents: read

on:
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        working-directory: ./VideoManager/VManBackend
        run: dotnet build

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './video-manager-frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./video-manager-frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./video-manager-frontend
        run: npm run lint

  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: videomanager
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Database=videomanager;Username=postgres;Password=postgres"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET tools
        working-directory: ./VideoManager
        run: dotnet tool restore

      - name: Build backend
        working-directory: ./VideoManager/VManBackend
        run: dotnet build

      - name: Apply database migrations
        working-directory: ./VideoManager/VManBackend
        run: dotnet ef database update

      - name: Start backend
        working-directory: ./VideoManager/VManBackend
        run: |
          dotnet run --no-build &
          echo $! > backend.pid
        env:
          USE_STUB_IMMICH: "true"
          ASPNETCORE_URLS: "http://localhost:5001"
          Jwt__SecretKey: "test-secret-key-min-32-characters-long-for-testing-only"
          Jwt__Issuer: "VManBackend"
          Jwt__Audience: "VManBackend"
          Immich__BaseUrl: "http://stub"

      - name: Wait for backend
        run: timeout 60 bash -c 'until curl -sf http://localhost:5001/health > /dev/null; do sleep 1; done'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './video-manager-frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./video-manager-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./video-manager-frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ./video-manager-frontend
        run: npx playwright test --project=chromium
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5001"

      - name: Stop backend
        if: always()
        run: |
          if [ -f ./VideoManager/VManBackend/backend.pid ]; then
            kill $(cat ./VideoManager/VManBackend/backend.pid) || true
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: video-manager-frontend/playwright-report/
          retention-days: 30
